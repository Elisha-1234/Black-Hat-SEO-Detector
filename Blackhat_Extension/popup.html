<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 320px; font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #fff; padding: 15px; text-align: center; }
        h3 { color: #00e5ff; margin-top: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        button { background: linear-gradient(135deg, #00e5ff, #007bb5); color: #020617; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px rgba(0,229,255,0.5); }
        #result { margin-top: 15px; font-size: 13px; text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); display: none; }
        .status { font-weight: 800; font-size: 16px; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
    </style>
</head>
<body>
    <h3>Black-Hat Hunter</h3>
    <p style="font-size: 13px; color: #94a3b8; margin-bottom: 15px;">Live Domain Forensics & Threat Scan</p>
    <button id="scanBtn">Scan Current Tab</button>
    <div id="result"></div>
    <script src="popup.js"></script>
</body>
</html>
